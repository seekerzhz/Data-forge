<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DataForge Queue</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>题面持续提交</h1>
      <p class="subtitle">并发后台处理，生成过程会显示扁平进度条，完成后自动下载 ZIP。</p>
      <div class="toolbar">
        <button class="button" type="button" data-action="add-item">新的题面</button>
      </div>
    </header>
    <section id="list" class="list" aria-label="题面提交列表"></section>
  </main>

  <template id="task-card-template">
    <article class="card">
      <div class="card-header">
        <h2 class="card-title"></h2>
        <span class="status is-idle">waiting-edit</span>
      </div>
      <div class="progress" aria-hidden="true">
        <div class="progress-bar"></div>
      </div>
      <div class="card-body">
        <div class="field-row">
          <div class="field">
            <label>题号</label>
            <input class="pid" placeholder="可空">
          </div>
          <div class="field">
            <label>数据组数</label>
            <input class="num_cases" type="number" min="1" value="20" title="数据组数">
          </div>
        </div>
        <div class="field">
          <label>题面 Markdown</label>
          <textarea class="md" rows="10" placeholder="粘贴题面"></textarea>
        </div>
        <div class="actions">
          <button class="button submit" type="button">提交本题面</button>
          <button class="button secondary clear" type="button">清除</button>
        </div>
      </div>
    </article>
  </template>

  <script src="/static/app.js" defer></script>
</body>
</html>
